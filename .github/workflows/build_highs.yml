name: Build rtctools-highs

on:
  push:
    tags:
      - "v*"
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Build HiGHS plugin
        run: uv run bash src/casadi_conic_highs/build_highs_plugin.sh

      - name: Stage plugin artifacts
        run: |
          plugin_dir=$(cat ci-work/plugin-lib-path.txt)
          cp "$plugin_dir"/libcasadi_conic_highs*.so src/rtctools_highs/
          # HiGHS Linux release uses a static lib; no .so to copy unless present
          if [ -f "$plugin_dir/libhighs.so" ]; then cp "$plugin_dir/libhighs.so" src/rtctools_highs/; fi

      - name: Build wheel
        run: uv build --wheel

      - name: Tag wheel for manylinux_2_28_x86_64
        run: uv run python -m wheel tags --platform-tag manylinux_2_28_x86_64 --remove dist/*.whl

      - name: Install wheel and run tests
        run: |
          uv pip install dist/*manylinux*.whl
          uv run pytest tests/ -v

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux
          path: dist/*manylinux*.whl

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-highs

      - name: Build HiGHS plugin
        run: |
          .venv\Scripts\Activate.ps1
          pwsh src/casadi_conic_highs/build_highs_plugin.ps1

      - name: Stage plugin artifacts
        run: |
          $pluginDir = (Get-Content ci-work\plugin-lib-path.txt -Raw).Trim()
          Copy-Item "$pluginDir\libcasadi_conic_highs*.dll" src\rtctools_highs\
          if (Test-Path "$pluginDir\libhighs*.dll") { Copy-Item "$pluginDir\libhighs*.dll" src\rtctools_highs\ }

      - name: Build wheel
        run: uv build --wheel

      - name: Repair wheel with delvewheel
        run: |
          # delvewheel renames transitive DLLs with a hash to avoid conflicts with
          # CasADi's bundled libhighs.dll, and sets the platform tag to win_amd64.
          # The MSYS2 MinGW64 bin directory is added so delvewheel resolves
          # zlib1.dll and other MinGW transitive deps.
          $msys2Bin = "C:\msys64\mingw64\bin"
          uv run delvewheel repair `
            --add-path "$msys2Bin" `
            --wheel-dir dist\ `
            dist\*.whl
          Remove-Item dist\*-none-any.whl -ErrorAction SilentlyContinue

      - name: Install wheel and run tests
        run: |
          uv pip install (Get-Item dist\*win_amd64*.whl).FullName
          uv run pytest tests/ -v

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows
          path: dist\*win_amd64*.whl

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/rtctools-highs
    permissions:
      id-token: write  # required for OIDC trusted publisher
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
