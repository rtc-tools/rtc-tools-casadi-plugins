name: Build rtctools-highs

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        # patchelf: required by auditwheel to rewrite RPATHs in the repaired wheel
        # zlib-devel: required by HiGHS cmake config's find_dependency(ZLIB)
        run: yum install -y patchelf zlib-devel

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: uv sync --group dev --python /opt/python/cp310-cp310/bin/python

      - name: Build HiGHS plugin
        run: uv run bash src/casadi_conic_highs/build_highs_plugin.sh

      - name: Stage plugin artifacts
        run: |
          plugin_dir=$(cat ci-work/plugin-lib-path.txt)
          cp "$plugin_dir"/libcasadi_conic_highs*.so src/rtctools_highs/
          # HiGHS Linux release uses a static lib; no .so to copy unless present
          if [ -f "$plugin_dir/libhighs.so" ]; then cp "$plugin_dir/libhighs.so" src/rtctools_highs/; fi

      - name: Build wheel
        run: uv build --wheel

      - name: Retag wheel as native before auditwheel
        # hatchling emits py3-none-any (data-file .so); auditwheel needs a platform tag.
        # abi-tag none: no CPython ABI dependency (matches CasADi's convention).
        run: |
          uv run python -m wheel tags \
            --python-tag cp310.cp311.cp312.cp313.cp314 --abi-tag none --platform-tag linux_x86_64 \
            --remove dist/*.whl

      - name: Repair wheel with auditwheel
        # --exclude libcasadi.so.3.7: provided by the casadi wheel; must not be vendored.
        # --exclude libhighs.so / libhighs.so.*: guard against a future dynamic HiGHS Linux
        #   release (static-only today) being pre-staged and bundled unrenamed. Both the
        #   unversioned name and versioned SONAMEs (e.g. libhighs.so.1) are excluded.
        #   The glob form libhighs.so.* requires auditwheel >= 6.2.0 (fnmatch added in PR #508).
        #   Currently a no-op because the build uses a static-only HiGHS release.
        run: |
          uv run auditwheel repair --plat manylinux_2_28_x86_64 \
            --exclude libcasadi.so.3.7 \
            --exclude libhighs.so \
            --exclude "libhighs.so.*" \
            --wheel-dir dist/ dist/*.whl
          rm -f dist/*-linux_x86_64.whl

      - name: Verify wheel contents
        # Guard: no-op today (static HiGHS), catches a missed --exclude if HiGHS ever ships a .so.
        run: |
          whl=$(ls dist/*manylinux*.whl)
          leaked=$(python3 -c "import zipfile,sys; print('\n'.join(n for n in zipfile.ZipFile(sys.argv[1]).namelist() if '/libhighs' in n))" "$whl")
          if [ -n "$leaked" ]; then echo "ERROR: libhighs found in wheel: $leaked"; exit 1; fi
          echo "OK: no libhighs in wheel"

      - name: Install wheel and run tests
        run: |
          uv pip install dist/*manylinux*.whl
          uv run pytest tests/ -v

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux
          path: dist/*manylinux*.whl

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Build HiGHS plugin
        run: |
          .venv\Scripts\Activate.ps1
          pwsh src/casadi_conic_highs/build_highs_plugin.ps1

      - name: Stage plugin artifacts
        # Only stage the CasADi plugin DLL. Do NOT copy libhighs.dll here —
        # if it is already inside the wheel when delvewheel runs, delvewheel
        # treats it as "already in wheel" and skips renaming it. The rename is
        # critical: it isolates our libhighs from CasADi's bundled copy.
        run: |
          $pluginDir = (Get-Content ci-work\plugin-lib-path.txt -Raw).Trim()
          Copy-Item "$pluginDir\libcasadi_conic_highs*.dll" src\rtctools_highs\

      - name: Build wheel
        run: uv build --wheel

      - name: Repair wheel with delvewheel
        # --analyze-existing: libcasadi_conic_highs.dll is a data-file DLL (not .pyd),
        # so delvewheel won't scan it unless told to. This finds libhighs.dll as an
        # external dep, renames it to libhighs-<hash>.dll (avoids CasADi's bundled
        # copy), patches the import table, and injects a PATH shim into __init__.py.
        # --exclude libcasadi.dll: also a dep of the plugin; provided by the casadi
        # wheel — must not be vendored (same rationale as --exclude libcasadi.so.3.7 on Linux).
        # --add-path "$pluginDir": where libhighs.dll lives (cmake output).
        # --add-path "$msys2Bin": runtime deps (zlib1.dll, etc.).
        # Separate output dir avoids SameFileError; retag happens in the next step.
        run: |
          $ErrorActionPreference = 'Stop'
          $pluginDir = (Get-Content ci-work\plugin-lib-path.txt -Raw).Trim()
          $msys2Root = if ($env:MSYS2_ROOT) { $env:MSYS2_ROOT } else { "C:\msys64" }
          $msys2Bin = "$msys2Root\mingw64\bin"
          if (-not (Test-Path $msys2Bin)) {
            throw "MSYS2 MinGW64 bin not found at $msys2Bin. Override with MSYS2_ROOT env var."
          }
          $whl = (Get-Item dist\*.whl).FullName
          uv run delvewheel repair `
            --analyze-existing `
            --exclude libcasadi.dll `
            --add-path "$pluginDir" `
            --add-path "$msys2Bin" `
            --wheel-dir dist\repaired\ `
            $whl
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Remove-Item dist\*.whl
          Move-Item dist\repaired\*.whl dist\
          Remove-Item -Recurse -Force dist\repaired\

      - name: Retag wheel as cp310.cp311.cp312.cp313.cp314-none-win_amd64
        # hatchling emits py3-none-any; delvewheel preserves that filename.
        # abi-tag none: no CPython ABI dependency (matches CasADi's convention).
        run: |
          $whl = (Get-Item dist\*.whl).FullName
          uv run python -m wheel tags `
            --python-tag cp310.cp311.cp312.cp313.cp314 --abi-tag none --platform-tag win_amd64 `
            --remove $whl

      - name: Verify wheel contents
        # LP tests pass with any HiGHS; this structural check is the only CI signal
        # that delvewheel actually renamed libhighs.dll (avoids silently using CasADi's bundled copy).
        run: |
          $whl = (Get-Item dist\*win_amd64*.whl).FullName
          $names = uv run python -c "import zipfile,sys; print('\n'.join(zipfile.ZipFile(sys.argv[1]).namelist()))" $whl
          $renamed  = $names | Where-Object { [System.IO.Path]::GetFileName($_).StartsWith('libhighs-') }
          $bare     = $names | Where-Object { [System.IO.Path]::GetFileName($_) -eq 'libhighs.dll' }
          $casadi   = $names | Where-Object { [System.IO.Path]::GetFileName($_) -eq 'libcasadi.dll' }
          if (-not $renamed) { Write-Error 'libhighs-<hash>.dll not found in wheel -- delvewheel rename may have been skipped'; exit 1 }
          if ($bare)         { Write-Error "un-renamed libhighs.dll found in wheel: $bare"; exit 1 }
          if ($casadi)       { Write-Error "libcasadi.dll must not be vendored (provided by casadi wheel): $casadi"; exit 1 }
          Write-Host "OK: libhighs renamed correctly -> $renamed"

      - name: Install wheel and run tests
        run: |
          # Strip MSYS2 from PATH to verify the wheel is self-contained (no zlib1.dll etc. leaking in).
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike '*msys*' -and $_ -notlike '*mingw*' }) -join ';'
          uv pip install (Get-Item dist\*win_amd64*.whl).FullName
          uv run pytest tests/ -v

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-windows
          path: dist\*win_amd64*.whl

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'rtc-tools/rtc-tools-casadi-plugins'
    environment:
      name: pypi
      url: https://pypi.org/p/rtctools-highs
    permissions:
      id-token: write  # required for OIDC trusted publisher
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
